# Caller for d-morrison/gha's reusable Claude PR review workflow.
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true
        type: string

jobs:
  review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read   # lets the reviewer read CI status (github_ci MCP server); without it the reusable workflow requests a permission the caller didn't grant and the run dies at startup_failure
    uses: d-morrison/gha/.github/workflows/claude-code-review.yml@v1
    secrets: inherit
    with:
      pr-number: ${{ inputs.pr_number }}
